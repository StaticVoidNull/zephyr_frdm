services:
  init:
    image: zephyr-build-image:latest
    build:
      context: .
    user: "1000:1000"
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      - ZEPHYR_INSTALL_DIR=/workspace/zephyr_env
      - ZEPHYR_SDK_INSTALL_DIR=/workspace/zephyr_env/zephyr_sdk
    command: >
      bash -c "
        rm -rf zephyr_env

        python3 -m venv $$ZEPHYR_INSTALL_DIR/.venv
        source $$ZEPHYR_INSTALL_DIR/.venv/bin/activate

        pip install west
        west init $$ZEPHYR_INSTALL_DIR
        cd $$ZEPHYR_INSTALL_DIR
        west update
        west packages pip --install

        west sdk install --install-base $$ZEPHYR_SDK_INSTALL_DIR -t arm-zephyr-eabi
      "

  interactive:
    image: zephyr-build-image:latest
    user: "1000:1000"
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      - ZEPHYR_INSTALL_DIR=/workspace/zephyr_env
      - ZEPHYR_SDK_INSTALL_DIR=/workspace/zephyr_env/zephyr_sdk
    command: bash -c "source $$ZEPHYR_INSTALL_DIR/.venv/bin/activate && exec bash"

  interactive_root:
    image: zephyr-build-image:latest
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      - ZEPHYR_INSTALL_DIR=/workspace/zephyr_env
      - ZEPHYR_SDK_INSTALL_DIR=/workspace/zephyr_env/zephyr_sdk
    command: bash -c "source $$ZEPHYR_INSTALL_DIR/.venv/bin/activate && exec bash"
